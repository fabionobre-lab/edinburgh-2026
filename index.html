.hero-inner{position:relative;z-index:1}
.hero-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.trip-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-lt);opacity:.75;font-weight:300}
.lang-toggle{display:flex;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.18)}

.lang-btn.on{background:rgba(255,255,255,.18);color:#fff;font-weight:500}
.trip-title{font-family:'Playfair Display',Georgia,serif;font-size:25px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:1px}
.trip-sub{font-size:11px;color:rgba(255,255,255,.5);font-weight:300;margin-bottom:10px;letter-spacing:.02em}
.vtabs{display:flex;border-radius:10px 10px 0 0;overflow:hidden;gap:1px;background:rgba(0,0,0,.2)}
.vtab{flex:1;padding:9px 6px;border:none;background:rgba(0,0,0,.22);cursor:pointer;font-size:11px;color:rgba(255,255,255,.5);font-family:'Source Serif 4',serif;font-weight:400;text-align:center;line-height:1.3;transition:all .2s}
.vtab.on{background:var(--cream);color:var(--ink);font-weight:500}
.daynav{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--cream);border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0}
.daynav::-webkit-scrollbar{display:none}
.daybtn{flex:1;min-width:0;padding:7px 3px 5px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2.5px solid transparent;transition:all .15s}
.daybtn.on{border-bottom-color:var(--tartan)}
.daybtn .dow{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--stone);font-family:'Source Serif 4',serif;transition:color .15s}
.daybtn .dnum{font-size:15px;font-weight:500;color:var(--stone);font-family:'Playfair Display',serif;line-height:1;transition:color .15s}
.daybtn.on .dow,.daybtn.on .dnum{color:var(--tartan)}
.bday-pip{width:5px;height:5px;border-radius:50%;background:var(--heather);margin-top:1px;opacity:0}
.daybtn.has-bday .bday-pip{opacity:1}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(20px + var(--safe-bottom))}
.day-hdr{margin:12px 13px 0;background:var(--tartan);border-radius:13px;padding:13px 15px 12px;position:relative;overflow:hidden}

.tb-tag.f{background:#daf0e5;color:var(--moss)}
.tb-tag.w{background:#ede8e0;color:var(--stone)}

.tb-note{background:#f0ece4;border-radius:7px;padding:5px 9px;margin-top:4px;font-size:11px;color:var(--stone);line-height:1.45}
.diff-add{background:#e5f5e8;border-left:2.5px solid var(--moss);border-radius:0 7px 7px 0;padding:5px 9px;margin-top:4px;font-size:11px;color:#1a3a1a;line-height:1.45}

</head>

       url:'https://maps.google.com/?q=Edinburgh+Airport',
       df:{k:'chg',en:"Added left luggage step \u2014 Liana's plan didn't account for 11:00 checkout.",
           pt:"Passo da guarda-volumes adicionado \u2014 o plano da Liana n\u00e3o considerava o check-out \u00e0s 11:00."}}
    ]}
  ]}
};

function gtag(key){
  var tgs=T[lang].tags;
  var cls={s:'s',fr:'s',lun:'f',din:'f',bkf:'f',cof:'f',rel:'f',spe:'f',cel:'b',bdy:'b',
    bkd:'c',sk:'c',tra:'w',log:'w',dep:'w',ful:'m',mu:'s',nat:'s',par:'s',arc:'s',vpt:'s',grd:'s',pal:'s'};
  return{label:tgs[key]||'',cls:cls[key]||'w'};
}

function setL(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('on',(i===0&&l==='en')||(i===1&&l==='pt'));});
  var t=T[l];
  document.getElementById('ey').textContent=t.ey;
  document.getElementById('ts').textContent=t.sub;
  document.getElementById('vt0').textContent=t.vt0;
  document.getElementById('vt1').textContent=t.vt1;
  t.dows.forEach(function(d,i){document.getElementById('dw'+i).textContent=d;});
  render();
}

function setV(v){
  cv=v;
  document.querySelectorAll('.vtab').forEach(function(b,i){b.classList.toggle('on',(i===0&&v==='liana')||(i===1&&v==='merged'));});
  render();
}

function sd(i){
  cd=i;
  document.querySelectorAll('.daybtn').forEach(function(b,j){b.classList.toggle('on',j===i);});
  document.getElementById('content').scrollTop=0;
  render();
}

// ── Weather ──────────────────────────────────────────────
var TRIP_DATES=['2026-04-15','2026-04-16','2026-04-17','2026-04-18','2026-04-19'];
var wx={},wxLoaded=false;
function wxEmoji(code){
  if(code===0)return'☀️';
  if(code<=2)return'🌤️';
  if(code===3)return'☁️';
  if(code<=48)return'🌫️';
  if(code<=55)return'🌦️';
  if(code<=65)return'🌧️';
  if(code<=77)return'❄️';
  if(code<=82)return'🌦️';
  return'⛈️';
}
function wxBadge(dayIdx,timeStr){
  if(!wxLoaded)return'';
  var date=TRIP_DATES[dayIdx];
  if(!date)return'';
  var clean=timeStr.replace(/[^0-9:]/g,'');
  var p=clean.split(':');
  if(!p[0])return'';
  var h=parseInt(p[0]),m=p[1]?parseInt(p[1]):0;
  if(m>=30)h=Math.min(h+1,23);
  var key=date+'-'+String(h).padStart(2,'0');
  var w=wx[key];
  if(!w)return'';
  return'<div class="wx">'+wxEmoji(w.code)+' '+Math.round(w.temp)+'°C</div>';
}
function wxDaySummary(dayIdx){
  if(!wxLoaded)return'';
  var date=TRIP_DATES[dayIdx];
  if(!date)return'';
  var temps=[],codes=[];
  for(var h=7;h<=22;h++){
    var key=date+'-'+String(h).padStart(2,'0');
    if(wx[key]){temps.push(wx[key].temp);codes.push(wx[key].code);}
  }
  if(!temps.length)return'';
  var hi=Math.round(Math.max.apply(null,temps));
  var lo=Math.round(Math.min.apply(null,temps));
  // most frequent code
  var freq={};
  codes.forEach(function(x){freq[x]=(freq[x]||0)+1;});
  var dom=Object.keys(freq).reduce(function(a,b){return freq[a]>freq[b]?a:b;});
  return'<div class="wx-hdr"><div class="wx-hdr-item">'+wxEmoji(parseInt(dom))+'</div>'
    +'<div class="wx-hdr-item">↑'+hi+'°C</div>'
    +'<div class="wx-hdr-item">↓'+lo+'°C</div></div>';
}
async function fetchWeather(){
  try{
    var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.9533&longitude=-3.1883&hourly=temperature_2m,weathercode,precipitation_probability&timezone=Europe%2FLondon&start_date=2026-04-15&end_date=2026-04-19&forecast_days=16');
    var d=await r.json();
    d.hourly.time.forEach(function(t,i){
      var p=t.split('T');
      var hr=p[1].slice(0,2);
      wx[p[0]+'-'+hr]={temp:d.hourly.temperature_2m[i],code:d.hourly.weathercode[i],precip:d.hourly.precipitation_probability[i]};
    });
    wxLoaded=true;
    render();
  }catch(e){}
}
// ─────────────────────────────────────────────────────────
function render(){
  var day=D[cv].days[cd];
  var isMerged=cv==='merged';
  var l=lang;
  var t=T[l];
  var h='';

  h+='<div class="day-hdr"><div class="dh-in">';
  h+='<div class="dh-eye">'+(l==='en'?day.de:day.dp)+'</div>';
  h+='<div class="dh-title">'+(l==='en'?day.te:day.tp)+'</div>';
  h+='<div class="dh-note">'+(l==='en'?day.ne:day.np)+'</div>';
  h+=wxDaySummary(cd);
  if(day.bday) h+='<div class="bday-strip">'+(l==='en'?day.bne:day.bnp)+'</div>';
  h+='</div></div><div class="tl">';

  day.bl.forEach(function(b,bi){
    var last=bi===day.bl.length-1;
    h+='<div class="tb"><div class="tb-left"><div class="tb-time">'+b.t+wxBadge(cd,b.t)+'</div>';
    h+='<div class="tb-dot-col"><div class="tb-dot" style="background:'+b.dot+'"></div>';
    if(!last) h+='<div class="tb-line"></div>';
    h+='</div></div><div class="tb-body">';
    h+='<div class="tb-title">'+(l==='en'?b.ie:b.ip)+'</div>';
    if(b.tg&&b.tg.length){
      h+='<div class="tb-tags">';
      b.tg.forEach(function(k){var r=gtag(k);if(r.label)h+='<span class="tb-tag '+r.cls+'">'+r.label+'</span>';});
      h+='</div>';
    }
    var meta=l==='en'?b.me:b.mp;
    if(meta) h+='<div class="tb-meta">'+meta+'</div>';
    if(b.wa) h+='<div class="tb-warn">'+t[b.wa]+'</div>';
    if(b.no) h+='<div class="tb-note">'+t[b.no]+'</div>';
    if(isMerged&&b.df){
      var cls=b.df.k==='add'?'diff-add':b.df.k==='chg'?'diff-chg':'diff-kp';
      var pfx=b.df.k==='add'?t.da:b.df.k==='chg'?t.dc:t.dk;
      h+='<div class="'+cls+'">'+pfx+(l==='en'?b.df.en:b.df.pt)+'</div>';
    }
    if(b.url) h+='<a class="map-btn" href="'+b.url+'" target="_blank"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'+t.maps+'</a>';
    h+='</div></div>';
  });
  h+='</div><div class="footer">Edinburgh April 2026 &bull; Fabio &amp; Liana</div>';
  document.getElementById('content').innerHTML=h;
}

setL('en');
fetchWeather();
</script>
